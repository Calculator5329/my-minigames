<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
<meta http-equiv="Pragma" content="no-cache">
<meta http-equiv="Expires" content="0">
<title>NotDop — Minigames</title>
<link rel="stylesheet" href="styles.css">
</head>
<body>

<div id="selector" class="view">
  <header class="top-bar">
    <h1 class="logo"><span class="logo-not">NOT</span><span class="logo-dop">DOP</span></h1>
    <div class="meta">
      <span class="coins" id="coin-display">&#9679; 0</span>
      <button class="icon-btn" id="mute-btn" title="Mute (M)">&#x1F50A;</button>
      <button class="icon-btn" id="shop-btn" title="Themes">Themes</button>
    </div>
  </header>

  <section class="grid" id="grid"></section>

  <footer class="bottom-bar">
    <span>Click a card to play &middot; Earn coins &middot; Unlock themes</span>
  </footer>
</div>

<div id="arcade" class="view hidden">
  <div class="arcade-topbar">
    <button class="icon-btn" id="back-btn">&larr; Back</button>
    <span class="game-title" id="game-title"></span>
    <span class="hud" id="hud"></span>
  </div>
  <div class="stage">
    <canvas id="stage-canvas" width="960" height="600"></canvas>
    <div class="overlay hidden" id="overlay"></div>
  </div>
</div>

<div id="shop" class="view hidden">
  <div class="arcade-topbar">
    <button class="icon-btn" id="shop-back-btn">&larr; Back</button>
    <span class="game-title">Cosmetic Themes</span>
    <span class="hud"><span class="coins" id="shop-coins">&#9679; 0</span></span>
  </div>
  <div class="shop-body" id="shop-body"></div>
</div>
